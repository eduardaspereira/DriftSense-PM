# Configurações Oficiais da Experiência (Mestrado)
experiment:
  repetitions: 5
  window_size: 10

detectors:
  det1:
    f1_threshold: 0.85
    persistence: 5
  det2:
    alpha_ks: 0.01

# --- NOVO: Configurações de Adaptação ---
adaptation:
  a1:
    retrain_interval: 50    # A1: Retreina a cada 50 janelas, quer haja erro ou não
  a2:
    fine_tune_trees: 10     # A2: Adiciona apenas 10 árvores novas ao LightGBM
    buffer_size: 20         # Tamanho da memória recente usada para adaptar o modelo

metrics:
  recovery_threshold: 0.85  # O modelo é considerado "Recuperado" quando o F1 volta a > 0.85

paths:
  processed_dir: "../data/processed/"
  models_dir: "../models/"
  results_dir: "../results/metrics/"